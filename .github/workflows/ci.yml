name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node-samples:
    name: ${{ matrix.sample }} (Node)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sample:
          - checkout-nextjs
          - checkout-express
          - checkout-paybylink-nextjs
          - platform-integrator-nextjs
          - payment-intents-node
          - payment-intents-3ds
          - saved-cards-mit
          - checkout-embedded
          - webhooks-node
          - agent-mcp
    defaults:
      run:
        working-directory: ./${{ matrix.sample }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.sample }}/package-lock.json

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Type check
        # Prefer the sample's own typecheck script; fall back to a bare
        # `tsc --noEmit` when the sample has a tsconfig but no script. Samples
        # with neither (e.g. agent-mcp — MCP config only, no source) just
        # verify that dependencies install.
        run: |
          if npm run | grep -qE '^\s*typecheck'; then
            npm run typecheck
          elif [ -f tsconfig.json ]; then
            npx tsc --noEmit
          else
            echo "no typecheck script and no tsconfig — install-only sample"
          fi

      - name: Lint (best-effort)
        run: npx eslint . --max-warnings=0 || echo "no eslint config — skipping"
        continue-on-error: true

      - name: Build
        env:
          # CI uses placeholder env so build doesn't fail validation. Real
          # samples need test keys at runtime, not build time.
          VON_PAY_SECRET_KEY: vp_sk_test_ci_placeholder
          VON_PAY_SESSION_SECRET: ss_test_ci_placeholder
        run: |
          if grep -q '"build"' package.json; then
            npm run build
          else
            echo "no build script — skipping"
          fi

  python-samples:
    name: ${{ matrix.sample }} (Python)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sample:
          - checkout-flask
          - payment-intents-python
    defaults:
      run:
        working-directory: ./${{ matrix.sample }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.sample }}/requirements.txt

      - name: Install
        run: pip install -r requirements.txt

      - name: Compile check
        # Byte-compile every .py in the sample. This catches syntax errors
        # without executing import-time side effects (env-var reads, sys.exit
        # on a missing key) — no runtime secrets needed.
        run: python -m py_compile *.py
